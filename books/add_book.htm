  <nav class="navbar navbar-expand-lg bg-purple">
    <div class="container">

        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center" id="menu">

        </ul>
      </div>
    </div>
  </nav>

  <main class="form-container">
    <div class="form-wrapper">
      <h2>Agregar Libro</h2>
      <div class="form-card">
        <form action="procesar_libro.php" method="post">
          <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" name="titulo" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Autor</label>
            <input type="text" class="form-control" name="autor" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Número de páginas</label>
            <input type="number" class="form-control" name="paginas">
          </div>
          <div class="mb-3">
            <label class="form-label">Edición</label>
            <input type="text" class="form-control" name="edicion">
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" name="descripcion"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Género</label>
            <input type="text" class="form-control" name="genero">
          </div>
          <div class="mb-3">
            <label class="form-label">Portada</label>
            <input type="file" class="form-control" name="portada" accept="image/*">
          </div>
          <button class="btn btn-custom">Agregar Libro</button>
        </form>
      </div>
    </div>
  </main>
